<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula CSS - Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="Avatar Adriana" class="avatar">
        <div class="info">
            <h1>Meu nome é: <span>Adriana</span></h1>
            <p>Mensagem: <i>A vida não é um morango! E tá tudo bem!</i></p>
        </div>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="Avatar Hugo" class="avatar">
        <div class="info">
            <h1>Meu nome é: <span>Hugo</span></h1>
            <p>Mensagem: <i>Um dia é da caça, o outro é do caçador.</i></p>
        </div>
    </div>

</body>
</html>
